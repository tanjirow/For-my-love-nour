<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nour ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:black;color:white;text-align:center;overflow-x:hidden;}
.section{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px;}
.active{display:flex;}

button{
padding:12px 25px;
margin:8px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:16px;
}

.backBtn{
background:#444;
color:white;
position:absolute;
top:20px;
left:20px;
}

.question-input{
padding:10px;
width:80%;
max-width:400px;
border-radius:10px;
border:none;
margin:10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startPage" class="section active">
<h1>✨ Start ✨</h1>
<button onclick="go('page1')">Start</button>
</div>

<!-- PAGE 1 -->
<div id="page1" class="section">
<button class="backBtn" onclick="go('startPage')">⬅ Back</button>
<h2>Will you accept something special? ❤️</h2>
<button onclick="go('page2')">Yes 😍</button>
<button>No 😅</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="section">
<button class="backBtn" onclick="go('page1')">⬅ Back</button>
<h2>I knew you would say yes 😍</h2>
<button onclick="go('page3')">Continue ❤️</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="section">
<button class="backBtn" onclick="go('page2')">⬅ Back</button>
<h2>Love Message ❤️</h2>
<button onclick="go('page4')">Secret 😳</button>
</div>

<!-- QUESTIONS -->
<div id="page4" class="section">
<button class="backBtn" onclick="go('page3')">⬅ Back</button>
<h2>When did we fall in love? ❤️</h2>
<input id="answer1" class="question-input">
<button onclick="saveAnswer('answer1')">Save</button>
<button onclick="go('page5')">Next ➡</button>
</div>

<div id="page5" class="section">
<button class="backBtn" onclick="go('page4')">⬅ Back</button>
<h2>A moment we can't describe 😍</h2>
<input id="answer2" class="question-input">
<button onclick="saveAnswer('answer2')">Save</button>
<button onclick="go('page6')">Next ➡</button>
</div>

<div id="page6" class="section">
<button class="backBtn" onclick="go('page5')">⬅ Back</button>
<h2>A happy memory 💖</h2>
<input id="answer3" class="question-input">
<button onclick="saveAnswer('answer3')">Save</button>
<button onclick="go('page7')">Next ➡</button>
</div>

<div id="page7" class="section">
<button class="backBtn" onclick="go('page6')">⬅ Back</button>
<h2>Tell me everything 💌</h2>
<input id="answer4" class="question-input">
<button onclick="saveAnswer('answer4')">Save</button>
<button onclick="go('page8')">See Answers</button>
</div>

<!-- PAGE 8 -->
<div id="page8" class="section">
<button class="backBtn" onclick="go('page7')">⬅ Back</button>
<h2>💌 Your Answers</h2>
<div id="allAnswers"></div>

<button onclick="go('lovePage')" style="background:#ff2e63;color:white">
I Love You 😘
</button>
</div>

<!-- LOVE PAGE (NEW) -->
<div id="lovePage" class="section">
<button class="backBtn" onclick="go('page8')">⬅ Back</button>
<h1>I LOVE YOU ❤️</h1>
<div id="finalAnswers"></div>
</div>

<script>

function go(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="page8") showAnswers();
if(id==="lovePage") showFinal();
}

/* SAVE ANSWERS */
function saveAnswer(id){
localStorage.setItem(id, document.getElementById(id).value);
alert("Saved ✅");
}

/* LOAD SAVED */
for(let i=1;i<=4;i++){
let val=localStorage.getItem("answer"+i);
if(val) document.getElementById("answer"+i).value=val;
}

/* SHOW ANSWERS */
function showAnswers(){
document.getElementById("allAnswers").innerHTML=`
<p>${localStorage.getItem("answer1")||"No answer"}</p>
<p>${localStorage.getItem("answer2")||"No answer"}</p>
<p>${localStorage.getItem("answer3")||"No answer"}</p>
<p>${localStorage.getItem("answer4")||"No answer"}</p>
`;
}

/* FINAL LOVE PAGE */
function showFinal(){
document.getElementById("finalAnswers").innerHTML=`
<h3>All your answers ❤️</h3>
<p>${localStorage.getItem("answer1")||""}</p>
<p>${localStorage.getItem("answer2")||""}</p>
<p>${localStorage.getItem("answer3")||""}</p>
<p>${localStorage.getItem("answer4")||""}</p>
`;
}

</script>
</body>
</html>
