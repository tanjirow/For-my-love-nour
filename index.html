<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nour ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
text-align:center;
background:black;
}

.section{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
position:absolute;
top:0;
left:0;
padding:20px;
}

.active{display:flex;}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

#yesBtn{background:#ff2e63;color:white;}
#noBtn{background:white;color:#ff2e63;}

.question-img{
width:220px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,100,0.5);
}

.question-input{
padding:12px;
border-radius:10px;
border:none;
width:80%;
max-width:400px;
margin-bottom:10px;
font-size:16px;
}

/* Flower */
.flower{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:30px;
}

.petal{
width:80px;
height:80px;
background:pink;
border-radius:50%;
position:absolute;
opacity:0.9;
box-shadow:0 0 25px hotpink,0 0 60px deeppink;
animation:glow 2s infinite ease-in-out;
}

.petal:nth-child(1){transform:rotate(0deg) translateY(-60px);}
.petal:nth-child(2){transform:rotate(72deg) translateY(-60px);}
.petal:nth-child(3){transform:rotate(144deg) translateY(-60px);}
.petal:nth-child(4){transform:rotate(216deg) translateY(-60px);}
.petal:nth-child(5){transform:rotate(288deg) translateY(-60px);}

.center{
width:40px;
height:40px;
background:deeppink;
border-radius:50%;
box-shadow:0 0 20px hotpink;
z-index:1;
}

@keyframes glow{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}

/* Hearts */
.heart{
position:fixed;
bottom:-20px;
color:pink;
animation:floatUp 8s linear infinite;
z-index:0;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

/* Video */
#loveVideo{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
background:black;
z-index:999999;
display:none;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="loveSong" src="love_song.mp3"></audio>

<!-- VIDEO -->
<video id="loveVideo" src="video1.mp4"></video>

<!-- START PAGE -->
<div id="startPage" class="section active">

<div class="flower">
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="center"></div>
</div>

<button onclick="startSite()" style="background:deeppink;color:white;font-size:26px;">
✨ Start ✨
</button>

<p style="margin-top:10px;color:#ff2e63;">
Be tough and press NO on everything! 😏
</p>

</div>

<!-- PAGE 1 -->
<div id="page1" class="section">
<h1>Will you accept something special? ❤️</h1>
<div>
<button id="yesBtn">Yes 😍</button>
<button id="noBtn">No 😅</button>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="section">
<h1>I knew it 😍</h1>
<button onclick="goToLove()">Continue ❤️</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="section">
<h2>For My Beautiful Nour ❤️</h2>
<p style="max-width:700px;margin:20px auto;">
No matter what happens, I will always love you 😍
</p>
<button onclick="showQuestions()">Secret 😳</button>
</div>

<!-- QUESTIONS -->
<div id="page4" class="section">
<img src="image4.jpg" class="question-img">
<h2>When did we fall in love? ❤️</h2>
<input id="answer1" class="question-input">
<button onclick="saveAnswer('answer1')">Save</button>
<button onclick="next('page5')">Next</button>
<button onclick="prev('page3')">Back</button>
</div>

<div id="page5" class="section">
<img src="image5.jpg" class="question-img">
<h2>A moment we can't describe 😍</h2>
<input id="answer2" class="question-input">
<button onclick="saveAnswer('answer2')">Save</button>
<button onclick="next('page6')">Next</button>
<button onclick="prev('page4')">Back</button>
</div>

<div id="page6" class="section">
<img src="image6.jpg" class="question-img">
<h2>A happy memory 💖</h2>
<input id="answer3" class="question-input">
<button onclick="saveAnswer('answer3')">Save</button>
<button onclick="next('page7')">Next</button>
<button onclick="prev('page5')">Back</button>
</div>

<div id="page7" class="section">
<img src="image7.jpg" class="question-img">
<h2>Tell me everything 💌</h2>
<input id="answer4" class="question-input">
<button onclick="saveAnswer('answer4')">Save</button>
<button onclick="next('page8')">See All</button>
<button onclick="prev('page6')">Back</button>
</div>

<!-- PAGE 8 -->
<div id="page8" class="section">
<h2>💌 Your Secret Answers 💌</h2>
<div id="allAnswers"></div>
<button onclick="playVideo()">I Love You 😘</button>
</div>

<script>
let loveSong=document.getElementById("loveSong");
let loveVideo=document.getElementById("loveVideo");

function startSite(){
document.getElementById("startPage").classList.remove("active");
document.getElementById("page1").classList.add("active");
loveSong.play();
}

document.getElementById("yesBtn").onclick=function(){
page1.classList.remove("active");
page2.classList.add("active");
}

document.getElementById("noBtn").onclick=function(){
this.innerText="Try again 😏";
}

function goToLove(){
page2.classList.remove("active");
page3.classList.add("active");
}

function showQuestions(){
page3.classList.remove("active");
page4.classList.add("active");
}

function next(id){
document.querySelector(".active").classList.remove("active");
document.getElementById(id).classList.add("active");
}

function prev(id){
document.querySelector(".active").classList.remove("active");
document.getElementById(id).classList.add("active");
}

function saveAnswer(id){
localStorage.setItem(id,document.getElementById(id).value);
alert("Saved ❤️");
}

function showAnswers(){
let div=document.getElementById("allAnswers");
div.innerHTML=`
<p>${localStorage.getItem("answer1")||""}</p>
<p>${localStorage.getItem("answer2")||""}</p>
<p>${localStorage.getItem("answer3")||""}</p>
<p>${localStorage.getItem("answer4")||""}</p>
`;
}

function playVideo(){
showAnswers();
loveSong.pause();
loveSong.currentTime=0;

loveVideo.style.display="block";
loveVideo.play();

if(loveVideo.requestFullscreen){
loveVideo.requestFullscreen();
}

loveVideo.onended=function(){
loveVideo.style.display="none";
if(document.fullscreenElement){
document.exitFullscreen();
}
document.querySelector(".active").classList.remove("active");
startPage.classList.add("active");
};
}

/* Hearts */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
},400);
</script>

</body>
</html>
